    <rect x="302" y="352" width="420" height="452" fill="#FFFFFF" opacity="0.10"/>
    <!-- coin stack -->
    <rect x="322" y="720" width="380" height="84" rx="14" fill="#E2AF2E"/>
    <rect x="342" y="668" width="340" height="60" rx="14" fill="#F7C948"/>
