<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#149E7C"/>
      <stop offset="1" stop-color="#05372B"/>
    </linearGradient>
    <clipPath id="jar1"><rect x="112" y="330" width="240" height="450" rx="48"/></clipPath>
    <clipPath id="jar2"><rect x="392" y="330" width="240" height="450" rx="48"/></clipPath>
    <clipPath id="jar3"><rect x="672" y="330" width="240" height="450" rx="48"/></clipPath>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- soft ground shadow -->
  <ellipse cx="512" cy="800" rx="430" ry="46" fill="#000000" opacity="0.18"/>

  <!-- jar 1: 70% full -->
  <g clip-path="url(#jar1)">
    <rect x="112" y="330" width="240" height="450" fill="#FFFFFF" opacity="0.14"/>
    <rect x="112" y="465" width="240" height="315" fill="#F7C948"/>
    <rect x="112" y="465" width="240" height="26" fill="#FFE08A"/>
  </g>
  <rect x="112" y="330" width="240" height="450" rx="48" fill="none" stroke="#FFFFFF" stroke-width="16" opacity="0.92"/>
  <rect x="142" y="272" width="180" height="52" rx="24" fill="#FFFFFF" opacity="0.92"/>

  <!-- jar 2: 45% full -->
  <g clip-path="url(#jar2)">
    <rect x="392" y="330" width="240" height="450" fill="#FFFFFF" opacity="0.14"/>
    <rect x="392" y="578" width="240" height="202" fill="#F7C948"/>
    <rect x="392" y="578" width="240" height="26" fill="#FFE08A"/>
  </g>
  <rect x="392" y="330" width="240" height="450" rx="48" fill="none" stroke="#FFFFFF" stroke-width="16" opacity="0.92"/>
  <rect x="422" y="272" width="180" height="52" rx="24" fill="#FFFFFF" opacity="0.92"/>

  <!-- jar 3: 25% full -->
  <g clip-path="url(#jar3)">
    <rect x="672" y="330" width="240" height="450" fill="#FFFFFF" opacity="0.14"/>
    <rect x="672" y="668" width="240" height="112" fill="#F7C948"/>
    <rect x="672" y="668" width="240" height="26" fill="#FFE08A"/>
  </g>
  <rect x="672" y="330" width="240" height="450" rx="48" fill="none" stroke="#FFFFFF" stroke-width="16" opacity="0.92"/>
  <rect x="702" y="272" width="180" height="52" rx="24" fill="#FFFFFF" opacity="0.92"/>

  <!-- coin dropping into jar 2 -->
  <circle cx="512" cy="176" r="58" fill="#F7C948" stroke="#D9A521" stroke-width="10"/>
  <rect x="484" y="168" width="56" height="16" rx="8" fill="#D9A521"/>
</svg>
