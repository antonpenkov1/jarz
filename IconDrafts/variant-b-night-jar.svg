<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.32" r="0.95">
      <stop offset="0" stop-color="#1C3B63"/>
      <stop offset="1" stop-color="#0B1A30"/>
    </radialGradient>
    <clipPath id="jar"><rect x="302" y="352" width="420" height="452" rx="64"/></clipPath>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <ellipse cx="512" cy="824" rx="330" ry="42" fill="#000000" opacity="0.28"/>

  <!-- glass body -->
