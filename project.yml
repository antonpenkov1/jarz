name: Jarz
options:
  bundleIdPrefix: com.antonpenkov
  deploymentTarget:
    iOS: "17.0"
targets:
  Jarz:
    type: application
    platform: iOS
    sources:
      - Jarz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonpenkov.jarz
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
# iCloud sync is code-ready; re-enable when a paid Apple Developer account is set up:
#        CODE_SIGN_ENTITLEMENTS: Jarz/Jarz.entitlements
#        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: Jarz
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
